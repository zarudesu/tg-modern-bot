version: '3.8'

services:
  telegram-bot:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: modern-telegram-bot
    restart: unless-stopped
    
    environment:
      # Загружаем переменные из .env файла
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - ADMIN_USER_ID=${ADMIN_USER_ID}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    
    volumes:
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
    
    networks:
      - bot-network
    
    depends_on:
      - postgres
      - redis
    
    healthcheck:
      test: ["CMD", "python", "-c", "import aiohttp; import asyncio; asyncio.run(aiohttp.ClientSession().get('https://api.telegram.org/bot${TELEGRAM_TOKEN}/getMe').close())"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    container_name: bot-postgres
    restart: unless-stopped
    
    environment:
      - POSTGRES_DB=telegram_bot
      - POSTGRES_USER=bot_user
      - POSTGRES_PASSWORD=bot_password_2024
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    
    networks:
      - bot-network
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot_user -d telegram_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bot-redis
    restart: unless-stopped
    
    command: redis-server --requirepass redis_password_2024
    
    volumes:
      - redis_data:/data
    
    networks:
      - bot-network
    
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  bot-network:
    driver: bridge
